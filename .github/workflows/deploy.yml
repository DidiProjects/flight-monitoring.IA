name: Deploy scraping.API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_CLIENT_SECRET }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Ensure Windows VM is running
        run: |
          ssh -o StrictHostKeyChecking=no -p 1024 diego@${{ vars.TAILSCALE_IP }} "
            virsh --connect qemu:///system start windows10 2>/dev/null || true
            for i in \$(seq 1 24); do
              sleep 5
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 diego@192.168.122.224 'exit' 2>/dev/null; then
                exit 0
              fi
            done
            echo 'Windows VM did not respond after 2 minutes'
            exit 1
          "

      - name: Create deploy archive
        run: tar czf deploy.tar.gz dist src package.json package-lock.json

      - name: Upload archive to VM
        run: |
          scp -o StrictHostKeyChecking=no \
              -o ProxyJump=diego@${{ vars.TAILSCALE_IP }}:1024 \
              deploy.tar.gz \
              diego@${{ vars.WINDOWS_VM_IP }}:~/deploy.tar.gz

      - name: Stop service, rotate and install
        run: |
          ssh -o StrictHostKeyChecking=no \
              -J diego@${{ vars.TAILSCALE_IP }}:1024 \
              diego@${{ vars.WINDOWS_VM_IP }} \
              powershell -NoProfile -NonInteractive << 'EOF'
          $base = Join-Path $HOME "artifacts\scraping-api"
          New-Item -ItemType Directory -Force -Path $base | Out-Null

          sc.exe stop scraping-api 2>$null
          Start-Sleep -Seconds 3

          # Extract archive to staging area
          $staging = "$base\_staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Set-Location $staging
          tar xzf (Join-Path $HOME "deploy.tar.gz")
          Remove-Item (Join-Path $HOME "deploy.tar.gz") -Force

          # Install deps only when package-lock changed
          $hashPath = "$base\.npm-lock-hash"
          $newHash = (Get-FileHash "$staging\package-lock.json" -Algorithm SHA256).Hash
          $oldHash = if (Test-Path $hashPath) { Get-Content $hashPath } else { "" }
          if ($newHash -ne $oldHash) {
            Write-Host "Dependencies changed, running npm ci..."
            Copy-Item "$staging\package.json"      "$base\package.json"      -Force
            Copy-Item "$staging\package-lock.json" "$base\package-lock.json" -Force
            Set-Location $base
            npm ci
            Set-Content $hashPath $newHash
            Write-Host "npm ci complete"
          } else {
            Write-Host "Dependencies unchanged"
          }

          # Rotate bundles: dist -> dist-previous
          $prev = "$base\dist-previous"
          $curr = "$base\dist"
          if (Test-Path $prev) { Remove-Item $prev -Recurse -Force }
          if (Test-Path $curr) { Rename-Item $curr $prev }
          Move-Item "$staging\dist" $curr

          # Update source files
          if (Test-Path "$base\src") { Remove-Item "$base\src" -Recurse -Force }
          Move-Item "$staging\src" "$base\src"

          Remove-Item $staging -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "Rotation complete"
          EOF

      - name: Write .env
        run: |
          ssh -o StrictHostKeyChecking=no \
              -J diego@${{ vars.TAILSCALE_IP }}:1024 \
              diego@${{ vars.WINDOWS_VM_IP }} \
              powershell -NoProfile -NonInteractive << 'EOF'
          $p = Join-Path $HOME "artifacts\scraping-api\.env"
          Set-Content  -Path $p -Value "PORT=${{ vars.SCRAPING_PORT }}"
          Add-Content  -Path $p -Value "SCRAPER_API_KEY=${{ secrets.SCRAPER_API_KEY }}"
          Add-Content  -Path $p -Value "FLIGHT_API_URL=${{ vars.FLIGHT_API_URL }}"
          Add-Content  -Path $p -Value "FLIGHT_API_KEY=${{ secrets.FLIGHT_API_KEY }}"
          Add-Content  -Path $p -Value "QUEUE_CONCURRENCY=${{ vars.QUEUE_CONCURRENCY }}"
          Add-Content  -Path $p -Value "RESULTS_DIR=C:\Users\diego\scraping-result"
          Add-Content  -Path $p -Value "LOG_LEVEL=${{ vars.LOG_LEVEL }}"
          Add-Content  -Path $p -Value "LOG_PRETTY=false"
          EOF

      - name: Reconfigure NSSM
        run: |
          ssh -o StrictHostKeyChecking=no \
              -J diego@${{ vars.TAILSCALE_IP }}:1024 \
              diego@${{ vars.WINDOWS_VM_IP }} \
              powershell -NoProfile -NonInteractive << 'EOF'
          $base    = Join-Path $HOME "artifacts\scraping-api"
          $logsDir = Join-Path $HOME "logs\scraping-api"
          $results = Join-Path $HOME "scraping-result"

          New-Item -ItemType Directory -Force -Path $logsDir | Out-Null
          New-Item -ItemType Directory -Force -Path $results  | Out-Null

          nssm set scraping-api Application    "C:\Program Files\nodejs\node.exe"
          nssm set scraping-api AppParameters  "$base\dist\main.cjs"
          nssm set scraping-api AppDirectory   $base
          nssm set scraping-api AppStdout      "$logsDir\service.log"
          nssm set scraping-api AppStderr      "$logsDir\service-error.log"
          nssm set scraping-api AppRotateFiles 1
          nssm set scraping-api AppRotateSeconds 86400
          nssm set scraping-api AppRotateBytes   10485760
          Write-Host "NSSM configured"
          EOF

      - name: Start service and health check
        run: |
          ssh -o StrictHostKeyChecking=no \
              -J diego@${{ vars.TAILSCALE_IP }}:1024 \
              diego@${{ vars.WINDOWS_VM_IP }} \
              powershell -NoProfile -NonInteractive << 'EOF'
          sc.exe start scraping-api
          Start-Sleep -Seconds 10

          $port = "3000"
          $envFile = Join-Path $HOME "artifacts\scraping-api\.env"
          if (Test-Path $envFile) {
            $line = Get-Content $envFile | Where-Object { $_ -match "^PORT=" }
            if ($line) { $port = ($line -split "=", 2)[1].Trim() }
          }
          $url = "http://localhost:$port/health"
          Write-Host "Health check: $url"
          for ($i = 1; $i -le 12; $i++) {
            try {
              $res = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 5
              if ($res.StatusCode -eq 200) { Write-Host "Health OK"; exit 0 }
            } catch { Write-Host "Attempt $i failed: $_" }
            Start-Sleep -Seconds 5
          }
          Write-Host "Health check failed after 60 seconds"
          exit 1
          EOF
