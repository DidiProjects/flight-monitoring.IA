name: Deploy scraping.API

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_CLIENT_SECRET }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Ensure Windows VM is running
        run: |
          ssh -o StrictHostKeyChecking=no -p 1024 diego@${{ vars.TAILSCALE_IP }} "
            virsh --connect qemu:///system start windows10 2>/dev/null || true
            for i in \$(seq 1 24); do
              sleep 5
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 diego@192.168.122.224 'exit' 2>/dev/null; then
                exit 0
              fi
            done
            echo 'Windows VM did not respond after 2 minutes'
            exit 1
          "

      - name: Sync and install
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          $projectDir = Join-Path $HOME "artifacts\scraping.API"
          if (-not (Test-Path $projectDir)) {
            New-Item -ItemType Directory -Path $projectDir -Force | Out-Null
            git clone -b develop https://github.com/${{ github.repository }}.git $projectDir
          }
          Set-Location $projectDir
          git pull
          npm ci
          EOF

      - name: Write .env
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          $p = Join-Path $HOME "artifacts\scraping.API\.env"
          Set-Content  -Path $p -Value "PORT=${{ vars.SCRAPING_PORT }}"
          Add-Content  -Path $p -Value "SCRAPER_API_KEY=${{ secrets.SCRAPER_API_KEY }}"
          Add-Content  -Path $p -Value "FLIGHT_API_URL=${{ vars.FLIGHT_API_URL }}"
          Add-Content  -Path $p -Value "FLIGHT_API_KEY=${{ secrets.FLIGHT_API_KEY }}"
          Add-Content  -Path $p -Value "QUEUE_CONCURRENCY=${{ vars.QUEUE_CONCURRENCY }}"
          Add-Content  -Path $p -Value "LOGS_DIR=./logs"
          Add-Content  -Path $p -Value "LOG_LEVEL=${{ vars.LOG_LEVEL }}"
          Add-Content  -Path $p -Value "LOG_PRETTY=false"
          EOF

      - name: Reconfigure NSSM
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          $dir = Join-Path $HOME "artifacts\scraping.API"
          nssm set scraping-api Application "C:\Program Files\nodejs\node.exe"
          nssm set scraping-api AppParameters "--import file:///C:/Users/diego/artifacts/scraping.API/node_modules/tsx/dist/esm/index.cjs C:/Users/diego/artifacts/scraping.API/src/main.ts"
          nssm set scraping-api AppDirectory $dir
          EOF

      - name: Restart service
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          $svc = "scraping-api"
          $status = (nssm status $svc 2>$null).Trim()
          if ($status -eq "SERVICE_RUNNING" -or $status -eq "SERVICE_PAUSED") {
            nssm stop $svc
            Start-Sleep -Seconds 3
          }
          nssm start $svc
          for ($i = 1; $i -le 6; $i++) {
            Start-Sleep -Seconds 5
            $final = (nssm status $svc).Trim()
            if ($final -eq "SERVICE_RUNNING") { Write-Host "Service running"; break }
            if ($i -eq 6) { Write-Error "Service failed to start: $final"; exit 1 }
          }
          EOF

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          if ($env:PORT) { $port = $env:PORT } else { $port = "3000" }
          $url = "http://localhost:$port/health"
          for ($i = 1; $i -le 6; $i++) {
            try {
              $res = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 5
              if ($res.StatusCode -eq 200) { Write-Host "Health OK"; exit 0 }
            } catch {}
            Start-Sleep -Seconds 5
          }
          Write-Error "Health check failed after 30 seconds"
          exit 1
          EOF

      - name: AI fallback, auto-fix scraper
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          Set-Location (Join-Path $HOME "artifacts\scraping.API")
          $env:ANTHROPIC_API_KEY = '${{ secrets.ANTHROPIC_API_KEY }}'
          npm run ai-fix
          EOF
