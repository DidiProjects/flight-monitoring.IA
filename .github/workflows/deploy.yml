name: Deploy to Server

on:
  workflow_dispatch:
  schedule:
    # Executa a cada hora
    - cron: '0 * * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_CLIENT_SECRET }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Ensure Windows VM is running
        run: |
          ssh -o StrictHostKeyChecking=no -p 1024 diego@${{ vars.TAILSCALE_IP }} \
            "virsh --connect qemu:///system start windows10 2>/dev/null || true; sleep 15"

      - name: Sync and install
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          $projectDir = Join-Path $HOME "projects\flight.API"
          if (-not (Test-Path $projectDir)) {
            git clone https://github.com/${{ github.repository }}.git $projectDir
          }
          Set-Location $projectDir
          git pull
          npm ci
          EOF

      - name: Run flight search
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          Set-Location (Join-Path $HOME "projects\flight.API")
          $env:RESULTS_DIR            = './results'
          $env:FLIGHT_ORIGIN          = '${{ vars.FLIGHT_ORIGIN }}'
          $env:FLIGHT_DESTINATION     = '${{ vars.FLIGHT_DESTINATION }}'
          $env:FLIGHT_TARGET_BRL      = '${{ vars.FLIGHT_TARGET_BRL }}'
          $env:FLIGHT_TARGET_PTS      = '${{ vars.FLIGHT_TARGET_PTS }}'
          $env:FLIGHT_TARGET_HYB_PTS  = '${{ vars.FLIGHT_TARGET_HYB_PTS }}'
          $env:FLIGHT_TARGET_HYB_BRL  = '${{ vars.FLIGHT_TARGET_HYB_BRL }}'
          $env:FLIGHT_MARGIN          = '${{ vars.FLIGHT_MARGIN }}'
          $env:FLIGHT_OUTBOUND_START  = '${{ vars.FLIGHT_OUTBOUND_START }}'
          $env:FLIGHT_OUTBOUND_END    = '${{ vars.FLIGHT_OUTBOUND_END }}'
          $env:FLIGHT_RETURN_START    = '${{ vars.FLIGHT_RETURN_START }}'
          $env:FLIGHT_RETURN_END      = '${{ vars.FLIGHT_RETURN_END }}'
          $env:FLIGHT_PASSENGERS      = '${{ vars.FLIGHT_PASSENGERS }}'
          $env:FLIGHT_VERBOSE         = '${{ vars.FLIGHT_VERBOSE }}'
          $env:LOG_LEVEL              = '${{ vars.LOG_LEVEL }}'
          $env:EMAIL_ENABLED          = '${{ vars.EMAIL_ENABLED }}'
          $env:EMAIL_RECIPIENT        = '${{ vars.EMAIL_RECIPIENT }}'
          $env:EMAIL_CC               = '${{ vars.EMAIL_CC }}'
          $env:EMAIL_SMTP_HOST        = '${{ vars.EMAIL_SMTP_HOST }}'
          $env:EMAIL_SMTP_PORT        = '${{ vars.EMAIL_SMTP_PORT }}'
          $env:EMAIL_SMTP_USER        = '${{ secrets.EMAIL_SMTP_USER }}'
          $env:EMAIL_SMTP_PASSWORD    = '${{ secrets.EMAIL_SMTP_PASSWORD }}'
          npm start
          EOF

      - name: Shutdown Windows VM
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -p 1024 diego@${{ vars.TAILSCALE_IP }} \
            "virsh --connect qemu:///system shutdown windows10 2>/dev/null || true"

      - name: AI fallback, auto-fix scraper
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no -J diego@${{ vars.TAILSCALE_IP }}:1024 diego@${{ vars.WINDOWS_VM_IP }} powershell -NoProfile -NonInteractive << 'EOF'
          Set-Location (Join-Path $HOME "projects\flight.API")
          $env:RESULTS_DIR            = './results'
          $env:FLIGHT_ORIGIN          = '${{ vars.FLIGHT_ORIGIN }}'
          $env:FLIGHT_DESTINATION     = '${{ vars.FLIGHT_DESTINATION }}'
          $env:FLIGHT_TARGET_BRL      = '${{ vars.FLIGHT_TARGET_BRL }}'
          $env:FLIGHT_TARGET_PTS      = '${{ vars.FLIGHT_TARGET_PTS }}'
          $env:FLIGHT_TARGET_HYB_PTS  = '${{ vars.FLIGHT_TARGET_HYB_PTS }}'
          $env:FLIGHT_TARGET_HYB_BRL  = '${{ vars.FLIGHT_TARGET_HYB_BRL }}'
          $env:FLIGHT_MARGIN          = '${{ vars.FLIGHT_MARGIN }}'
          $env:FLIGHT_OUTBOUND_START  = '${{ vars.FLIGHT_OUTBOUND_START }}'
          $env:FLIGHT_OUTBOUND_END    = '${{ vars.FLIGHT_OUTBOUND_END }}'
          $env:FLIGHT_RETURN_START    = '${{ vars.FLIGHT_RETURN_START }}'
          $env:FLIGHT_RETURN_END      = '${{ vars.FLIGHT_RETURN_END }}'
          $env:FLIGHT_PASSENGERS      = '${{ vars.FLIGHT_PASSENGERS }}'
          $env:FLIGHT_VERBOSE         = '${{ vars.FLIGHT_VERBOSE }}'
          $env:LOG_LEVEL              = '${{ vars.LOG_LEVEL }}'
          $env:EMAIL_ENABLED          = '${{ vars.EMAIL_ENABLED }}'
          $env:EMAIL_RECIPIENT        = '${{ vars.EMAIL_RECIPIENT }}'
          $env:EMAIL_CC               = '${{ vars.EMAIL_CC }}'
          $env:EMAIL_SMTP_HOST        = '${{ vars.EMAIL_SMTP_HOST }}'
          $env:EMAIL_SMTP_PORT        = '${{ vars.EMAIL_SMTP_PORT }}'
          $env:EMAIL_SMTP_USER        = '${{ secrets.EMAIL_SMTP_USER }}'
          $env:EMAIL_SMTP_PASSWORD    = '${{ secrets.EMAIL_SMTP_PASSWORD }}'
          $env:ANTHROPIC_API_KEY      = '${{ secrets.ANTHROPIC_API_KEY }}'
          npm run ai-fix
          EOF
