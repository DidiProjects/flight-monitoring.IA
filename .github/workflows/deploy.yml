name: Deploy to Server

on:
  workflow_dispatch:
  schedule:
    # Executa a cada hora
    - cron: '0 * * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_CLIENT_SECRET }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync project to server
        run: |
          ssh -o StrictHostKeyChecking=no diego@${{ vars.TAILSCALE_IP }} \
            "mkdir -p /home/diego/flight-tracker"

          rsync -az \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='results/' \
            --exclude='debug-*.png' \
            ./ diego@${{ vars.TAILSCALE_IP }}:/home/diego/flight-tracker/

      - name: Install dependencies
        run: |
          ssh -o StrictHostKeyChecking=no diego@${{ vars.TAILSCALE_IP }} << 'EOF'
          cd /home/diego/flight-tracker
          npm ci
          EOF

      - name: Run flight search
        run: |
          ssh -o StrictHostKeyChecking=no diego@${{ vars.TAILSCALE_IP }} << 'EOF'
          cd /home/diego/flight-tracker
          RESULTS_DIR=./results \
          FLIGHT_ORIGIN="${{ vars.FLIGHT_ORIGIN }}" \
          FLIGHT_DESTINATION="${{ vars.FLIGHT_DESTINATION }}" \
          FLIGHT_TARGET_BRL="${{ vars.FLIGHT_TARGET_BRL }}" \
          FLIGHT_TARGET_PTS="${{ vars.FLIGHT_TARGET_PTS }}" \
          FLIGHT_TARGET_HYB_PTS="${{ vars.FLIGHT_TARGET_HYB_PTS }}" \
          FLIGHT_TARGET_HYB_BRL="${{ vars.FLIGHT_TARGET_HYB_BRL }}" \
          FLIGHT_MARGIN="${{ vars.FLIGHT_MARGIN }}" \
          FLIGHT_OUTBOUND_START="${{ vars.FLIGHT_OUTBOUND_START }}" \
          FLIGHT_OUTBOUND_END="${{ vars.FLIGHT_OUTBOUND_END }}" \
          FLIGHT_RETURN_START="${{ vars.FLIGHT_RETURN_START }}" \
          FLIGHT_RETURN_END="${{ vars.FLIGHT_RETURN_END }}" \
          FLIGHT_PASSENGERS="${{ vars.FLIGHT_PASSENGERS }}" \
          FLIGHT_VERBOSE="${{ vars.FLIGHT_VERBOSE }}" \
          LOG_LEVEL="${{ vars.LOG_LEVEL }}" \
          EMAIL_ENABLED="${{ vars.EMAIL_ENABLED }}" \
          EMAIL_RECIPIENT="${{ vars.EMAIL_RECIPIENT }}" \
          EMAIL_CC="${{ vars.EMAIL_CC }}" \
          EMAIL_SMTP_HOST="${{ vars.EMAIL_SMTP_HOST }}" \
          EMAIL_SMTP_PORT="${{ vars.EMAIL_SMTP_PORT }}" \
          EMAIL_SMTP_USER="${{ secrets.EMAIL_SMTP_USER }}" \
          EMAIL_SMTP_PASSWORD="${{ secrets.EMAIL_SMTP_PASSWORD }}" \
          npm start
          EOF

      - name: AI fallback, auto-fix scraper
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no diego@${{ vars.TAILSCALE_IP }} << 'EOF'
          cd /home/diego/flight-tracker
          RESULTS_DIR=./results \
          FLIGHT_ORIGIN="${{ vars.FLIGHT_ORIGIN }}" \
          FLIGHT_DESTINATION="${{ vars.FLIGHT_DESTINATION }}" \
          FLIGHT_TARGET_BRL="${{ vars.FLIGHT_TARGET_BRL }}" \
          FLIGHT_TARGET_PTS="${{ vars.FLIGHT_TARGET_PTS }}" \
          FLIGHT_TARGET_HYB_PTS="${{ vars.FLIGHT_TARGET_HYB_PTS }}" \
          FLIGHT_TARGET_HYB_BRL="${{ vars.FLIGHT_TARGET_HYB_BRL }}" \
          FLIGHT_MARGIN="${{ vars.FLIGHT_MARGIN }}" \
          FLIGHT_OUTBOUND_START="${{ vars.FLIGHT_OUTBOUND_START }}" \
          FLIGHT_OUTBOUND_END="${{ vars.FLIGHT_OUTBOUND_END }}" \
          FLIGHT_RETURN_START="${{ vars.FLIGHT_RETURN_START }}" \
          FLIGHT_RETURN_END="${{ vars.FLIGHT_RETURN_END }}" \
          FLIGHT_PASSENGERS="${{ vars.FLIGHT_PASSENGERS }}" \
          FLIGHT_VERBOSE="${{ vars.FLIGHT_VERBOSE }}" \
          LOG_LEVEL="${{ vars.LOG_LEVEL }}" \
          EMAIL_ENABLED="${{ vars.EMAIL_ENABLED }}" \
          EMAIL_RECIPIENT="${{ vars.EMAIL_RECIPIENT }}" \
          EMAIL_CC="${{ vars.EMAIL_CC }}" \
          EMAIL_SMTP_HOST="${{ vars.EMAIL_SMTP_HOST }}" \
          EMAIL_SMTP_PORT="${{ vars.EMAIL_SMTP_PORT }}" \
          EMAIL_SMTP_USER="${{ vars.EMAIL_SMTP_USER }}" \
          EMAIL_SMTP_PASSWORD="${{ secrets.EMAIL_SMTP_PASSWORD }}" \
          ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
          npm run ai-fix
          EOF
